services:
  - type: web
    name: markdown-to-pdf-api
    runtime: node
    plan: starter
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: npm run start:api
    envVars:
      - key: NODE_VERSION
        value: 22.0.0
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
